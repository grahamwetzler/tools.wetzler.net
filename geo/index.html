<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geo Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <script src="https://unpkg.com/h3-js@4" defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; }

    .container { display: flex; height: 100vh; }

    .sidebar {
      width: 300px;
      min-width: 300px;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar h1 {
      font-size: 1.1rem;
      padding: 16px;
      border-bottom: 1px solid #2a2a4a;
      color: #fff;
    }

    .add-layer-section {
      padding: 16px;
      border-bottom: 1px solid #2a2a4a;
    }

    .add-layer-section label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: #aaa;
    }

    .add-layer-section select,
    .add-layer-section textarea,
    .add-layer-section button {
      width: 100%;
      font-family: inherit;
    }

    .add-layer-section select {
      padding: 8px;
      background: #2a2a4a;
      color: #e0e0e0;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }

    .add-layer-section textarea {
      padding: 8px;
      background: #2a2a4a;
      color: #e0e0e0;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      resize: vertical;
      min-height: 120px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
    }

    .add-layer-section button {
      padding: 10px;
      background: #4363d8;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .add-layer-section button:hover { background: #3453c8; }

    .layers-section {
      padding: 16px;
      flex: 1;
    }

    .layers-section h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 12px;
    }

    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 4px;
    }

    .layer-item:hover { background: #2a2a4a; }

    .layer-item .visibility-btn {
      background: none;
      border: none;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 4px;
    }

    .layer-item .visibility-btn.hidden { opacity: 0.3; }

    .layer-item .layer-name {
      flex: 1;
      font-size: 0.9rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .layer-item input[type="color"] {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    .layer-item .delete-btn {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
    }

    .layer-item .delete-btn:hover { color: #e6194b; }

    #map { flex: 1; }

    .error-msg {
      color: #e6194b;
      font-size: 0.8rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h1>Geo Viewer</h1>
      <div class="add-layer-section">
        <label for="layer-type">Layer type</label>
        <select id="layer-type">
          <option value="geojson">GeoJSON</option>
          <option value="h3">H3 Cells</option>
        </select>
        <label for="layer-data">Data</label>
        <textarea id="layer-data" placeholder="Paste GeoJSON here..."></textarea>
        <button id="add-layer-btn">Add to Map</button>
        <div id="error-msg" class="error-msg" aria-live="polite"></div>
      </div>
      <div class="layers-section">
        <h2>Layers</h2>
        <div id="layers-list"></div>
      </div>
    </div>
    <div id="map"></div>
  </div>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      const map = L.map('map').setView([40, -95], 4);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 19
      }).addTo(map);

      const COLORS = ['#e6194b', '#3cb44b', '#4363d8', '#f58231', '#911eb4',
                      '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990'];
      let colorIndex = 0;
      let layerIdCounter = 0;
      const layers = [];
      let restoring = false;

      const STORAGE_KEY = 'geo-viewer-layers';

      function saveLayers() {
        if (restoring) return;
        const serializable = layers.map(({ id, name, type, color, visible, data }) => ({
          id, name, type, color, visible, data
        }));
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(serializable));
        } catch (e) {
          // storage unavailable or quota exceeded — ignore
        }
      }

      function restoreLayers() {
        restoring = true;
        let saved;
        try {
          saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        } catch (e) {
          localStorage.removeItem(STORAGE_KEY);
          return;
        }
        if (!Array.isArray(saved) || saved.length === 0) return;

        for (const entry of saved) {
          try {
            if (entry.type === 'geojson') {
              addGeoJSONLayer(JSON.stringify(entry.data));
            } else if (entry.type === 'h3') {
              addH3Layer(Array.isArray(entry.data) ? entry.data.join('\n') : entry.data);
            }
            // Override auto-generated metadata with saved values
            const layer = layers[layers.length - 1];
            layer.id = entry.id;
            layer.name = entry.name;
            layer.color = entry.color;
            if (!entry.visible) {
              toggleLayerVisibility(layer.id);
            }
          } catch (e) {
            // Skip corrupt layer entries
          }
        }

        // Sync counters to avoid ID collisions
        layerIdCounter = Math.max(layerIdCounter, ...layers.map(l => l.id));
        renderLayerList();
        restoring = false;
      }

      function nextColor() {
        const color = COLORS[colorIndex % COLORS.length];
        colorIndex++;
        return color;
      }

      function addLayerToState(name, type, color, leafletLayer, data) {
        const layer = {
          id: ++layerIdCounter,
          name,
          type,
          color,
          leafletLayer,
          visible: true,
          data
        };
        layers.push(layer);
        leafletLayer.addTo(map);
        renderLayerList();
        saveLayers();
        return layer;
      }

      function removeLayer(id) {
        const idx = layers.findIndex(l => l.id === id);
        if (idx === -1) return;
        map.removeLayer(layers[idx].leafletLayer);
        layers.splice(idx, 1);
        renderLayerList();
        saveLayers();
      }

      function toggleLayerVisibility(id) {
        const layer = layers.find(l => l.id === id);
        if (!layer) return;
        layer.visible = !layer.visible;
        if (layer.visible) {
          layer.leafletLayer.addTo(map);
        } else {
          map.removeLayer(layer.leafletLayer);
        }
        renderLayerList();
        saveLayers();
      }

      function changeLayerColor(id, newColor) {
        const layer = layers.find(l => l.id === id);
        if (!layer) return;
        layer.color = newColor;
        if (typeof layer.leafletLayer.setStyle === 'function') {
          layer.leafletLayer.setStyle({ color: newColor, fillColor: newColor });
        } else if (typeof layer.leafletLayer.eachLayer === 'function') {
          layer.leafletLayer.eachLayer(sub => {
            if (typeof sub.setStyle === 'function') {
              sub.setStyle({ color: newColor, fillColor: newColor });
            }
          });
        }
        saveLayers();
      }

      function renderLayerList() {
        const container = document.getElementById('layers-list');
        container.innerHTML = '';

        if (layers.length === 0) {
          container.innerHTML = '<div style="color:#666;font-size:0.85rem;">No layers added yet.</div>';
          return;
        }

        for (const layer of layers) {
          const item = document.createElement('div');
          item.className = 'layer-item';
          item.innerHTML = `
            <button class="visibility-btn ${layer.visible ? '' : 'hidden'}"
                    data-id="${layer.id}" title="Toggle visibility">
              ${layer.visible ? '👁' : '🙈'}
            </button>
            <span class="layer-name"></span>
            <input type="color" value="${layer.color}" data-id="${layer.id}" title="Change color">
            <button class="delete-btn" data-id="${layer.id}" title="Remove layer">&times;</button>
          `;
          item.querySelector('.layer-name').textContent = layer.name;
          container.appendChild(item);
        }

        container.querySelectorAll('.visibility-btn').forEach(btn => {
          btn.addEventListener('click', () => toggleLayerVisibility(Number(btn.dataset.id)));
        });
        container.querySelectorAll('input[type="color"]').forEach(input => {
          input.addEventListener('input', () => changeLayerColor(Number(input.dataset.id), input.value));
        });
        container.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', () => removeLayer(Number(btn.dataset.id)));
        });
      }

      // Restore persisted layers or initialize empty state
      restoreLayers();

      let geojsonCount = 0;
      let h3Count = 0;

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatProperties(props) {
        if (!props || Object.keys(props).length === 0) return 'No properties';
        return Object.entries(props)
          .map(([k, v]) => `<b>${escapeHtml(k)}:</b> ${escapeHtml(v)}`)
          .join('<br>');
      }

      function addGeoJSONLayer(text) {
        let geojson;
        try {
          geojson = JSON.parse(text);
        } catch (e) {
          throw new Error('Invalid JSON: ' + e.message);
        }
        if (!geojson.type) {
          throw new Error('Not valid GeoJSON: missing "type" field');
        }

        const color = nextColor();
        geojsonCount++;
        const name = 'GeoJSON ' + geojsonCount;

        const leafletLayer = L.geoJSON(geojson, {
          style: { color, fillColor: color, fillOpacity: 0.3, weight: 2 },
          pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
            radius: 6, color, fillColor: color, fillOpacity: 0.5, weight: 2
          }),
          onEachFeature: (feature, layer) => {
            layer.bindTooltip(formatProperties(feature.properties), { sticky: true });
          }
        });

        const added = addLayerToState(name, 'geojson', color, leafletLayer, geojson);
        try {
          map.fitBounds(leafletLayer.getBounds());
        } catch (e) {
          // getBounds may fail if layer has no features — ignore
        }
        return added;
      }

      function addH3Layer(text) {
        const ids = text.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
        if (ids.length === 0) {
          throw new Error('No H3 cell IDs found.');
        }

        for (const id of ids) {
          if (!h3.isValidCell(id)) {
            throw new Error(`Invalid H3 cell ID: "${id}"`);
          }
        }

        const color = nextColor();
        h3Count++;
        const name = 'H3 ' + h3Count;

        const polygons = [];
        for (const id of ids) {
          const boundary = h3.cellToBoundary(id);
          const latLngs = boundary.map(([lat, lng]) => [lat, lng]);
          const polygon = L.polygon(latLngs, {
            color, fillColor: color, fillOpacity: 0.3, weight: 2
          });
          const res = h3.getResolution(id);
          polygon.bindTooltip(
            `<b>Cell:</b> ${escapeHtml(id)}<br><b>Resolution:</b> ${res}`,
            { sticky: true }
          );
          polygons.push(polygon);
        }

        const layerGroup = L.featureGroup(polygons);
        const added = addLayerToState(name, 'h3', color, layerGroup, ids);
        try {
          map.fitBounds(layerGroup.getBounds());
        } catch (e) {
          // empty group — ignore
        }
        return added;
      }

      document.getElementById('add-layer-btn').addEventListener('click', () => {
        const type = document.getElementById('layer-type').value;
        const data = document.getElementById('layer-data').value.trim();
        const errorEl = document.getElementById('error-msg');
        errorEl.textContent = '';

        if (!data) {
          errorEl.textContent = 'Please paste some data.';
          return;
        }

        try {
          if (type === 'geojson') {
            addGeoJSONLayer(data);
          } else if (type === 'h3') {
            addH3Layer(data);
          }
          document.getElementById('layer-data').value = '';
        } catch (e) {
          errorEl.textContent = e.message;
        }
      });

      document.getElementById('layer-type').addEventListener('change', (e) => {
        const textarea = document.getElementById('layer-data');
        textarea.placeholder = e.target.value === 'geojson'
          ? 'Paste GeoJSON here...'
          : 'Paste H3 cell IDs (one per line or comma-separated)...';
      });
    });
  </script>
</body>
</html>
